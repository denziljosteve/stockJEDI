name: stockJEDI CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
    # - name: Test with pytest
    #   run: |
    #     pytest backend/app/tests

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v3
    - name: Build Backend Docker Image
      run: docker build -t stockjedi-backend ./backend
    - name: Build Frontend Docker Image
      run: docker build -t stockjedi-frontend ./frontend
    # Placeholder for pushing to a registry and applying kubernetes configs
    # run: kubectl apply -f deployment/kubernetes.yaml
